name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[docs]"
      - run: sphinx-build -b html docs docs/_build/html
      - uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
